services:
  - type: web
    name: projetogruposp0
    runtime: node
    plan: starter
    buildCommand: npm install && npm --prefix backend install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /opt/render/project/src/backend-data
